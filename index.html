  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

hlight-color: transparent; }\n  [data-flip] { -webkit-tap-highlight-color: transparent; }\n  [data-flip]:focus { outline: none; }\n  [data-flip]:focus-visible { box-shadow: 0 0 0 3px rgba(236,234,227,0.5); }\n\n  /* ===== keyboard focus rings (a11y) ===== */\n  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible { outline:2px solid var(--mint); outline-offset:3px; border-radius:6px; }\n\n  /* ===== service card titles: reserve two lines so all cards align ===== */\n  #services [data-reveal] > h3 { line-height:1.15; min-height:2.3em; display:flex; align-items:flex-end; justify-content:center; }\n\n  /* wrapper stays invisible to layout except in the medium contact breakpoint below */\n  #contact-textblock { display:contents; }\n\n  /* ===== TABLET ===== */\n  @media (max-width: 900px){\n    #services, #philosophy { padding-left:28px !important; padding-right:28px !important; }\n  }\n\n  /* ===== CONTACT: desktop only — bottom-align the (still-square, uncropped) photo with the KPI row ===== */\n  @media (min-width: 1001px){\n    #contact > div { align-items:stretch !important; }\n    #contact-photo { align-self:end !important; }\n  }\n\n  /* ===== CONTACT: \"small but not mobile\" — eyebrow full width, title+text+links beside photo, KPIs their own full-width row ===== */\n  @media (min-width: 761px) and (max-width: 1000px){\n    #contact > div { display:grid !important; grid-template-columns:1fr 1fr !important; row-gap:0 !important; column-gap:48px !important; align-items:start !important; }\n    #contact-col { display:contents !important; }\n    #contact-eyebrow { grid-column:1 / -1; grid-row:1; margin-bottom:6px !important; }\n    #contact-textblock { display:flex !important; flex-direction:column !important; grid-column:1; grid-row:2; }\n    #contact-lead { margin-top:14px !important; max-width:none !important; }\n    #contact-links { margin-top:10px !important; }\n    #contact-photo { grid-column:2; grid-row:2; margin-top:0 !importan >\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--sky);\"><\u002Fspan>Agile is only on paper, the reality is chaos<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:auto; padding-top:12px; display:flex; align-items:center; justify-content:flex-end; gap:6px; font-size:11px; font-weight:600; letter-spacing:0.04em; color:var(--sky);\">See my solution<span style=\"font-size:14px; line-height:1;\">↺<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:linear-gradient(180deg,var(--sky) 0,var(--sky) 3px,var(--card) 3px); border:1px solid var(--border); border-radius:16px; padding:20px 26px; display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(0,0,0,0.18); transform:rotateY(180deg);\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--sky); margin:0 0 10px;\">My Solution<\u002Fdiv>\n            <p style=\"margin:0; font-size:12.5px; line-height:1.7; color:var(--text-body);\">Agile frameworks are primarily a mindset, not a rulebook, which is exactly why they work. Over the past decade, I have worked in various Scrum teams and salvaged chaotic agile projects by incorporating my practical experience. My main goal is to leave each project self-sufficient even after I step away.<\u002Fp>\n            <div style=\"margin-top:auto; padding-top:14px; display:flex; flex-wrap:wrap; gap:7px;\"><span style=\"font-size:11px; color:var(--sky); border:1px solid rgba(var(--sky-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Scrum<\u002Fspan><span style=\"font-size:11px; color:var(--sky); border:1px solid rgba(var(--sky-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">PSPO I<\u002Fspan><span style=\"font-size:11px; color:var(--sky); border:1px solid rgba(var(--sky-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">SAFe<\u002Fspan><span style=\"font-size:11px; color:var(--sky); border:1px solid rgba(var(--sky-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">HERMES<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex; flex-direction:column;\">\n      <h3 style=\"margin:0 0 14px; font-size:22px; font-weight:800; color:var(--butter); text-align:center;\">Solution Design<\u002Fh3>\n      <div data-flip=\"\" tabindex=\"0\" role=\"button\" aria-label=\"Solution Design — reveal how I help\" style=\"perspective:1400px; cursor:pointer; border-radius:16px; outline:none; flex:1;\">\n        <div data-flip-inner=\"\" style=\"display:grid; width:100%; height:100%; transition:transform .6s cubic-bezier(.2,.7,.2,1); transform-style:preserve-3d;\">\n          <div style=\"grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:linear-gradient(180deg,var(--butter) 0,var(--butter) 3px,var(--card) 3px); border:1px solid var(--border); border-radius:16px; padding:20px 26px; display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(0,0,0,0.18); \">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--butter); margin:0 0 20px;\">Problem Statement<\u002Fdiv>\n            <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:11px;\">\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--butter);\"><\u002Fspan>Every sprint reopens previously completed tasks<\u002Fli>\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--butter);\"><\u002Fspan>Engineers and stakeholders are not aligned<\u002Fli>\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--butter);\"><\u002Fspan>The implementation starts before anyone agrees what “done” really means<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:auto; padding-top:12px; display:flex; align-items:center; justify-content:flex-end; gap:6px; font-size:11px; font-weight:600; letter-spacing:0.04em; color:var(--butter);\">See my solution<span style=\"font-size:14px; line-height:1;\">↺<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:linear-gradient(180deg,var(--butter) 0,var(--butter) 3px,var(--card) 3px); border:1px solid var(--border); border-radius:16px; padding:20px 26px; display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(0,0,0,0.18); transform:rotateY(180deg);\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--butter); margin:0 0 10px;\">My Solution<\u002Fdiv>\n            <p style=\"margin:0; font-size:12.5px; line-height:1.7; color:var(--text-body);\">I do the thinking that saves the building. I get everyone seeing the same system, the same scope, and the same priorities before the work begins, so momentum holds when surprises arrive later. Forged in regulated industries (banking and public sector) and workflow automation, including a CHF 25M+ greenfield project.<\u002Fp>\n            <div style=\"margin-top:auto; padding-top:14px; display:flex; flex-wrap:wrap; gap:7px;\"><span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">UML<\u002Fspan><span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">arc42<\u002Fspan><span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">KYC Onboarding<\u002Fspan><span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">SaaS<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex; flex-direction:column;\">\n      <h3 style=\"margin:0 0 14px; font-size:22px; font-weight:800; color:var(--pink); text-align:center;\">Business Architecture<\u002Fh3>\n      <div data-flip=\"\" tabindex=\"0\" role=\"button\" aria-label=\"Business Architecture — reveal how I help\" style=\"perspective:1400px; cursor:pointer; border-radius:16px; outline:none; flex:1;\">\n        <div data-flip-inner=\"\" style=\"display:grid; width:100%; height:100%; transition:transform .6s cubic-bezier(.2,.7,.2,1); transform-style:preserve-3d;\">\n          <div style=\"grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:linear-gradient(180deg,var(--pink) 0,var(--pink) 3px,var(--card) 3px); border:1px solid var(--border); border-radius:16px; padding:20px 26px; display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(0,0,0,0.18); \">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--pink); margin:0 0 20px;\">Problem Statement<\u002Fdiv>\n            <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:11px;\">\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--pink);\"><\u002Fspan>Scaling the organization multiplies problems faster than returns<\u002Fli>\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--pink);\"><\u002Fspan>Everything still routes through a few key people<\u002Fli>\n            <li style=\"font-size:13.5px; color:var(--text-body); line-height:1.7; padding-left:16px; position:relative;\"><span style=\"position:absolute; left:0; top:8.5px; width:6px; height:6px; border-radius:50%; background:var(--pink);\"><\u002Fspan>Strategic initiatives start strong, then quietly fade<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:auto; padding-top:12px; display:flex; align-items:center; justify-content:flex-end; gap:6px; font-size:11px; font-weight:600; letter-spacing:0.04em; color:var(--pink);\">See my solution<span style=\"font-size:14px; line-height:1;\">↺<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"grid-area:1/1; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:linear-gradient(180deg,var(--pink) 0,var(--pink) 3px,var(--card) 3px); border:1px solid var(--border); border-radius:16px; padding:20px 26px; display:flex; flex-direction:column; box-shadow:0 8px 24px rgba(0,0,0,0.18); transform:rotateY(180deg);\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--pink); margin:0 0 10px;\">My Solution<\u002Fdiv>\n            <p style=\"margin:0; font-size:12.5px; line-height:1.7; color:var(--text-body);\">Complexity and ambiguity are where I thrive. I map how a business really runs and rebuild it around roles and processes that scale, so growth pays off, expertise stops bottlenecking, and big initiatives actually land. As both Business Analyst and Enterprise Architect, I have done exactly this at the executive level.<\u002Fp>\n            <div style=\"margin-top:auto; padding-top:14px; display:flex; flex-wrap:wrap; gap:7px;\"><span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">ISO 27001<\u002Fspan><span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">BPMN<\u002Fspan><span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">ITIL<\u002Fspan><span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">FINMA<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- Fractional CIO — distinct 'catch-all' closing band -->\n  <div data-reveal=\"\" style=\"margin-top:40px; text-align:center;\">\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:16px;\">\n      <span style=\"height:1px; width:60px; background:var(--border);\"><\u002Fspan>\n      <span style=\"font-size:14px; font-style:italic; color:var(--text-muted);\">Why stop there?<\u002Fspan>\n      <span style=\"height:1px; width:60px; background:var(--border);\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"cio-band\" data-reveal=\"\" style=\"position:relative; overflow:hidden; border:1px solid var(--border); border-radius:20px; padding:20px 44px 30px; background:var(--bg-alt); text-align:center;\">\n    <div style=\"position:relative;\">\n      <h3 style=\"margin:0 auto 12px; font-size:22px; font-weight:800; letter-spacing:-0.01em; color:var(--mint);\">Fractional CIO<\u002Fh3>\n      <p style=\"margin:0 auto; font-size:16px; line-height:1.65; color:var(--text-body); max-width:600px;\">In case you do not know where to start and all your business processes and IT infrastructure gets the best of you, I step in.&nbsp;As your part-time CIO, I take care of whatever your business needs so you can really focus on what you do best.<\u002Fp>\n      <div id=\"cio-chips\" style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:20px;\">\n        <span style=\"font-size:11px; white-space:nowrap; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">IT Strategy<\u002Fspan>\n        <span style=\"font-size:11px; white-space:nowrap; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Governance, Risk &amp; Compliance<\u002Fspan>\n        <span style=\"font-size:11px; white-space:nowrap; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Vendor &amp; Partner Network<\u002Fspan>\n        <span style=\"font-size:11px; white-space:nowrap; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Digital Transformation<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ REFERENCES (carousel) ============================ -->\n<section id=\"references\" data-screen-label=\"References\" style=\"scroll-margin-top:80px; background:var(--bg-alt); border-top:1px solid var(--surface-2); border-bottom:1px solid var(--surface-2); padding:100px 0;\">\n  <div data-carousel=\"\" style=\"max-width:1180px; margin:0 auto; padding:0 40px; position:relative;\">\n    <div data-reveal=\"\" style=\"margin-bottom:40px;\">\n      <div style=\"max-width:620px;\">\n        <div style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px;\">// REFERENCES<\u002Fdiv>\n        <h2 style=\"margin:0; font-family:'Archivo',sans-serif; font-weight:800; font-size:46px; line-height:1.02; letter-spacing:-0.03em; color:var(--text);\">What I’ve done<\u002Fh2>\n        <p style=\"margin:18px 0 0; font-size:17px; line-height:1.6; color:var(--text-muted);\">A decade of shipping work I'm proud of and that made me who I am today.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button data-carousel-prev=\"\" aria-label=\"Previous\" style=\"position:absolute; left:2px; z-index:120; width:46px; height:46px; border-radius:50%; background:var(--card); border:1px solid var(--border-strong); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,0.35); transition:all .2s ease;\" style-hover=\"border-color:var(--text); background:var(--surface-2); transform:translateY(-50%) scale(1.08);\">←<\u002Fbutton>\n    <button data-carousel-next=\"\" aria-label=\"Next\" style=\"position:absolute; right:2px; z-index:120; width:46px; height:46px; border-radius:50%; background:var(--card); border:1px solid var(--border-strong); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,0.35); transition:all .2s ease;\" style-hover=\"border-color:var(--text); background:var(--surface-2); transform:translateY(-50%) scale(1.08);\">→<\u002Fbutton>\n    <div data-carousel-track=\"\" data-reveal=\"\" style=\"display:flex; gap:20px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:8px; scrollbar-width:none;\">\n      <div data-card=\"\" data-accent=\"--butter\" style=\"scroll-snap-align:center; flex:0 0 320px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px; min-height:200px; display:flex; flex-direction:column; transition:border-color .2s ease;\" style-hover=\"border-color:var(--butter);\">\n        <span style=\"font-size:13px; color:var(--butter); font-weight:600;\">2022 –&nbsp;2025<\u002Fspan>\n        <h3 style=\"margin:12px 0 8px; font-size:20px; font-weight:700; color:var(--text);\">Public Greenfield Project<\u002Fh3>\n        <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--text-muted);\">As Product Owner, I was responsible for the entire software development lifecycle, from idea to release, implementing a workflow engine with over 100+ business processes, all processing highly sensitive data in a highly complex environment.<\u002Fp>\n        <div style=\"margin-top:auto; padding-top:16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px;\">\n          <span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Public Sector<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">CHF 25M+<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--butter); border:1px solid rgba(var(--butter-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">HERMES<\u002Fspan>\n          \n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-card=\"\" data-accent=\"--mint\" style=\"scroll-snap-align:center; flex:0 0 320px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px; min-height:200px; display:flex; flex-direction:column; transition:border-color .2s ease;\" style-hover=\"border-color:var(--mint);\">\n        <span style=\"font-size:13px; color:var(--mint); font-weight:600;\">2025+<\u002Fspan>\n        <h3 style=\"margin:10px 0 8px; font-size:20px; font-weight:700; color:var(--text);\">Right hand of the CEO<\u002Fh3>\n        <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--text-muted);\">At Primesites GmbH, I assumed the role of the CTO with the aim to setup the tech stack and business architecture for future-oriented growth. Within the first months, I decreased fixed cost of tools by over 70%. At the same time, I established the foundations for effective project execution by recruiting and mentoring industry experts in design, development, and project management.<\u002Fp>\n        <div style=\"margin-top:auto; padding-top:16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px;\">\n          <span style=\"font-size:11px; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">IT Infrastructure<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">IT Strategy<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--mint); border:1px solid rgba(var(--mint-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">Recruiting<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-card=\"\" data-accent=\"--pink\" style=\"scroll-snap-align:center; flex:0 0 320px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:26px; min-height:200px; display:flex; flex-direction:column; transition:border-color .2s ease;\" style-hover=\"border-color:var(--pink);\">\n        <span style=\"font-size:13px; color:var(--pink); font-weight:600;\">2024 – 2025<\u002Fspan>\n        <h3 style=\"margin:10px 0 8px; font-size:20px; font-weight:700; color:var(--text);\">Security, made the standard<\u002Fh3>\n        <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--text-muted);\">As Enterprise Architect in a SME, I led the implementation of the internal Information Security Management System based on ISO 27001, raising security and compliance across the company. Building on that, I streamlined workflows and rolled out new standards and initiatives, such as GRC software, to make strong security the default.<\u002Fp>\n        <div style=\"margin-top:auto; padding-top:16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px;\">\n          <span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">ISO 27001<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">ISMS<\u002Fspan>\n          <span style=\"font-size:11px; color:var(--pink); border:1px solid rgba(var(--pink-rgb),0.4); border-radius:999px; padding:3px 10px; letter-spacing:0.04em;\">GRC<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-card=\"\" data-accent=\"--sky\" style=\"scroll-snap-align:center; flex:0 0 320px; background:var(--card-dashed); border:1px dashed var(--border-dashed); border-radius:16px; padding:26px; min-height:200px; display:flex; flex-direction:column; transition:border-color .2s ease;\" style-hover=\"border-color:var(--sky);\">\n        <span style=\"font-size:13px; color:var(--sky); font-weight:600;\">Open slot<\u002Fspan>\n        <h3 style=\"margin:10px 0 8px; font-size:20px; font-weight:700; color:var(--text);\">This could be your project<\u002Fh3>\n        <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--text-muted);\">Every case study on this page started as a short conversation. Send me yours, and let's find out what we can build.<\u002Fp>\n        <div style=\"margin-top:auto; padding-top:16px;\">\n          <a href=\"#contact\" style=\"display:inline-flex; align-items:center; gap:8px; text-decorati .5px solid rgba(var(--sky-rgb),0.65); background:rgba(var(--sky-rgb),0.05);\"><\u002Fdiv>\n    <div style=\"position:absolute; left:260px; top:140px; width:300px; height:300px; border-radius:50%; border:1.5px solid rgba(var(--pink-rgb),0.65); background:rgba(var(--pink-rgb),0.05);\"><\u002Fdiv>\n    <div style=\"position:absolute; left:140px; top:260px; width:300px; height:300px; border-radius:50%; border:1.5px solid rgba(var(--butter-rgb),0.65); background:rgba(var(--butter-rgb),0.05);\"><\u002Fdiv>\n    <!-- labels -->\n    <div style=\"position:absolute; left:50%; top:78px; transform:translateX(-50%); text-align:center; width:200px;\"><div style=\"font-size:15px; font-weight:700; color:var(--mint);\">What you love<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:absolute; left:44px; top:50%; transform:translateY(-50%); text-align:center; width:150px;\"><div style=\"font-size:15px; font-weight:700; color:var(--sky);\">What you’re good at<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:absolute; right:44px; top:50%; transform:translateY(-50%); text-align:center; width:150px;\"><div style=\"font-size:15px; font-weight:700; color:var(--pink);\">Where value flows<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:absolute; left:50%; bottom:78px; transform:translateX(-50%); text-align:center; width:220px;\"><div style=\"font-size:15px; font-weight:700; color:var(--butter-deep);\">What the world needs<\u002Fdiv><\u002Fdiv>\n    <!-- center -->\n    <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center;\">\n      <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:26px; letter-spacing:-0.02em; color:var(--text);\">Ikigai<\u002Fdiv>\n      <div style=\"font-size:12px; color:var(--text-muted); margin-top:2px;\">生き甲斐<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-reveal=\"\" style=\"max-width:680px; margin:48px auto 0; text-align:center;\">\n    <p style=\"margin:0; font-size:15px; line-height:1.7; color:var(--text-body);\">My approach is Design Thinking: only once the problem is truly identified can the right solution be found. Two degrees and years of experience taught me that the honest answer often matters more than the fast one.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CONTACT ============================ -->\n<section id=\"contact\" data-screen-label=\"Contact\" style=\"scroll-margin-top:80px; background:var(--bg-alt); border-top:1px solid var(--surface-2); padding:110px 0;\">\n  <div style=\"max-width:1180px; margin:0 auto; padding:0 40px; display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start;\">\n    <div id=\"contact-col\" data-reveal=\"\" style=\"display:flex; flex-direction:column;\">\n      <div id=\"contact-eyebrow\" style=\"font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px;\">// CONTACT<\u002Fdiv>\n      <div id=\"contact-textblock\">\n      <h2 style=\"margin:0; font-family:'Archivo',sans-serif; font-weight:800; font-size:46px; line-height:1.0; letter-spacing:-0.03em; color:var(--text);\">Who I am<\u002Fh2>\n      <p id=\"contact-lead\" style=\"margin:22px 0 0; font-size:17px; line-height:1.65; color:var(--text-muted); max-width:520px;\">Opinionated, and happy to be proven wrong. I work async-first and value transparency as much as mutual trust. If any of this resonates, let's get in touch:<\u002Fp>\n      <div id=\"contact-links\" style=\"display:flex; flex-direction:column; align-items:flex-start; gap:12px; margin-top:24px;\">\n        <a href=\"mailto:mischa.kalin@yonkai.ch\" style=\"display:inline-flex; align-items:center; gap:12px; text-decoration:none; padding:13px 20px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); font-weight:600; font-size:15px; transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;\" style-hover=\"border-color:var(--pink ar(--text-muted); margin-top:6px;\">years in tech<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:44px; line-height:1; color:var(--sky);\">24/7<\u002Fdiv><div style=\"font-size:13px; color:var(--text-muted); margin-top:6px;\">Kaizen<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:44px; line-height:1; color:var(--butter);\">30M+<\u002Fdiv><div style=\"font-size:13px; color:var(--text-muted); margin-top:6px;\">in project budgets<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:44px; line-height:1; color:var(--pink);\">100%<\u002Fdiv><div style=\"font-size:13px; color:var(--text-muted); margin-top:6px;\">built on mutual trust<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"contact-photo\" data-reveal=\"\" style=\"position:relative; margin-top:29px; border:1px solid var(--border); border-radius:20px; overflow:hidden; background:var(--card); aspect-ratio:1/1;\">\n      <img src=\"cf6daf67-0b59-46b1-95ed-856c08a9bc11\" alt=\"Mischa Kälin\" style=\"display:block; width:100%; height:100%; object-fit:cover; object-position:center 42%;\">\n      <div style=\"position:absolute; left:0; right:0; bottom:0; padding:48px 24px 20px; background:linear-gradient(to top, rgba(0,0,0,0.6), transparent); pointer-events:none;\">\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:24px; letter-spacing:-0.02em; color:#fff;\">Mischa Kälin<\u002Fdiv>\n        <div style=\"font-size:13px; color:rgba(255,255,255,0.8); margin-top:2px;\">Independent IT Consultant<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ FOOTER ============================ -->\n<footer style=\"max-width:1180px; margin:0 auto; padding:30px 40px; display:flex; align-items:center; justify-content:space-between; font-size:13p
